<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S Y N D I C A T E _ O V E R R I D E</title>
    <style>
        :root {
            --bg: #030303;
            --text: #ffffff;
            --accent: #ff003c;
            --accent2: #00f0ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; /* Более читаемый, современный шрифт */
            font-weight: 900;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        #container {
            width: 90%;
            max-width: 1000px;
            position: relative;
            z-index: 10;
        }

        .line {
            font-size: 3vw;
            line-height: 1.2;
            margin: 5px 0;
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            word-wrap: break-word;
        }

        /* Цветовое кодирование для контраста */
        .signal-start { color: var(--accent2); font-size: 2vw; letter-spacing: 5px; margin-bottom: 20px;}
        .msg { color: var(--text); }
        .awkward { color: #888; font-size: 2vw; text-transform: lowercase; font-style: italic; }
        .impact { font-size: 5vw; color: var(--text); text-shadow: 4px 4px 0px var(--accent); margin-top: 30px; line-height: 1;}
        .signal-lost { 
            color: var(--accent); 
            font-size: 6vw; 
            margin-top: 50px;
            text-align: center;
            background: var(--text);
            padding: 10px;
            display: inline-block;
        }

        /* Эффект расшифровки текста */
        .scramble {
            display: inline-block;
            font-family: monospace;
            color: var(--accent2);
        }

        /* Агрессивные анимации */
        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }

        .screen-shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }

        .flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
        }
        
        .flash-active { animation: flashAnim 0.15s ease-out; }

        @keyframes flashAnim {
            0% { opacity: 1; mix-blend-mode: exclusion; }
            100% { opacity: 0; }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        /* Глитч для финального стейта */
        .hard-glitch {
            position: relative;
        }
        .hard-glitch::before, .hard-glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
        }
        .hard-glitch::before {
            left: 4px;
            text-shadow: -2px 0 var(--accent);
            animation: glitch-anim-1 0.2s infinite linear alternate-reverse;
        }
        .hard-glitch::after {
            left: -4px;
            text-shadow: -2px 0 var(--accent2);
            animation: glitch-anim-2 0.3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 40% 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); }
            60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(90% 0 5% 0); }
            100% { clip-path: inset(50% 0 30% 0); }
        }

        #bg-data {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            color: rgba(255,0,60,0.05);
            font-family: monospace;
            font-size: 10px;
            word-wrap: break-word;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        /* Кнопка */
        #restart {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            background: none; border: 1px solid #333; color: #333;
            padding: 5px 10px; cursor: pointer; opacity: 0; transition: opacity 0.3s;
        }
        #restart:hover { color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="flash" id="flasher"></div>
    <div id="bg-data"></div>
    <div id="container"></div>
    <button id="restart" onclick="location.reload()">↺ RESTART</button>

    <script>
        const container = document.getElementById('container');
        const flasher = document.getElementById('flasher');
        const bgData = document.getElementById('bg-data');
        const restartBtn = document.getElementById('restart');

        // Фоновый мусор для глубины
        let bgInterval = setInterval(() => {
            let str = '';
            for(let i=0; i<200; i++) str += Math.random().toString(36).substr(2, 5) + ' ';
            bgData.innerText = str;
        }, 100);

        // Сценарий. Паузы (pause) сделаны так, чтобы видео длилось около 20 секунд.
        const sequence = [
            { text: "[SIGNAL_START]", class: "signal-start", scramble: true, pause: 1500 },
            { text: "> всем привет.", class: "msg", scramble: false, typeSpeed: 30, pause: 1000 },
            { text: "> занимаюсь глитчем вся фигня.", class: "msg", scramble: false, typeSpeed: 20, pause: 1200 },
            { text: "> эм.. пук.. прив.. хех.", class: "awkward", scramble: false, typeSpeed: 80, pause: 2000 }, 
            { text: "> делаю артефакты из ничего.", class: "msg", scramble: false, typeSpeed: 20, pause: 1500 },
            { text: "> ЗАБИРАЙ СВОЙ INDUSTRIAL PACK.", class: "impact", scramble: true, flash: true, shake: true, pause: 4000 },
            { clear: true, pause: 200 },
            { text: "[SIGNAL_LOST]", class: "signal-lost hard-glitch", scramble: false, flash: true, shake: true, pause: 5000 }
        ];

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // Эффект подбора символов (кибер-декодинг)
        async function scrambleText(element, finalString, duration = 600) {
            const chars = '!<>-_\\/[]{}—=+*^?#________';
            let iterations = duration / 30;
            let currentStr = Array(finalString.length).fill('').map(() => chars[Math.floor(Math.random() * chars.length)]);
            
            element.innerHTML = `<span class="scramble">${currentStr.join('')}</span>`;
            
            for (let i = 0; i < iterations; i++) {
                await sleep(30);
                for (let j = 0; j < finalString.length; j++) {
                    if (Math.random() > 0.8 || i > iterations - 5) {
                        currentStr[j] = finalString[j];
                    } else if (currentStr[j] !== finalString[j]) {
                        currentStr[j] = chars[Math.floor(Math.random() * chars.length)];
                    }
                }
                element.innerHTML = `<span class="scramble">${currentStr.join('')}</span>`;
            }
            element.innerHTML = finalString;
        }

        // Печать по буквам (быстрая)
        async function typeText(element, text, speed) {
            element.innerHTML = '';
            for (let i = 0; i < text.length; i++) {
                element.innerHTML += text.charAt(i);
                await sleep(speed + (Math.random() * 20));
            }
        }

        async function triggerFlash() {
            flasher.classList.remove('flash-active');
            void flasher.offsetWidth; // trigger reflow
            flasher.classList.add('flash-active');
        }

        async function triggerShake() {
            document.body.classList.remove('screen-shake');
            void document.body.offsetWidth;
            document.body.classList.add('screen-shake');
        }

        async function run() {
            await sleep(1000); // Стартовая пауза для старта записи

            for (const step of sequence) {
                if (step.clear) {
                    container.innerHTML = '';
                    await sleep(step.pause);
                    continue;
                }

                if (step.flash) triggerFlash();
                if (step.shake) triggerShake();

                const el = document.createElement('div');
                el.className = `line ${step.class}`;
                if (step.text === "[SIGNAL_LOST]") el.setAttribute('data-text', step.text);
                container.appendChild(el);

                if (step.scramble) {
                    await scrambleText(el, step.text);
                } else if (step.typeSpeed) {
                    await typeText(el, step.text, step.typeSpeed);
                } else {
                    el.innerHTML = step.text;
                }

                if (step.text === "[SIGNAL_LOST]") {
                    clearInterval(bgInterval);
                    bgData.style.opacity = 0.5;
                    bgData.style.color = "rgba(255, 0, 60, 0.2)";
                }

                await sleep(step.pause);
            }
            
            restartBtn.style.opacity = 1;
        }

        run();
    </script>
</body>
</html>
